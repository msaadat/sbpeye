{% extends "_base.html" %}

{% block title %}SBPEye - Intelligent SBP Index{% endblock %}

{% block nav_actions %}
<div class="flex items-center gap-2">
    <span class="hidden sm:inline text-xs text-gray-400 dark:text-gray-500" id="last-sync-label">
        Last synced: {{ last_sync }}
    </span>
</div>
{% endblock %}

{% block content %}
<div x-data="{ activeTab: 'browse' }" @switch-to-search="activeTab = 'search'">
    <!-- Dashboard -->
    <section class="mb-8">
        <div id="news-container"
             hx-get="/partials/news"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800">
                        <div class="skeleton h-4 w-32"></div>
                    </div>
                    <div class="p-4 space-y-3">
                        <div class="skeleton h-3 w-full"></div>
                        <div class="skeleton h-3 w-5/6"></div>
                        <div class="skeleton h-3 w-4/6"></div>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800">
                        <div class="skeleton h-4 w-28"></div>
                    </div>
                    <div class="p-4 space-y-3">
                        <div class="skeleton h-3 w-full"></div>
                        <div class="skeleton h-3 w-4/5"></div>
                        <div class="skeleton h-3 w-3/5"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Circulars -->
    <section>
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
            <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100">Circulars Index</h2>
            <form id="search-form"
                  hx-get="/partials/search"
                  hx-target="#search-results"
                  hx-swap="innerHTML"
                  hx-indicator="#search-spinner"
                  hx-on::after-request="this.dispatchEvent(new CustomEvent('switch-to-search', {bubbles: true}))"
                  class="flex flex-col gap-3 w-full sm:w-auto">
                <div class="flex items-center gap-2">
                    <div class="relative flex-1 sm:w-72">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="search" name="q" id="search-input"
                               placeholder="Search by text or meaning..."
                               class="w-full pl-9 pr-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-sbp-500/50 focus:border-sbp-500 transition-colors">
                    </div>
                    <button type="submit"
                            class="px-4 py-2 text-sm font-medium rounded-lg bg-sbp-600 hover:bg-sbp-700 text-white transition-colors">
                        Search
                    </button>
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <select name="department" class="px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-sbp-500/50 focus:border-sbp-500 transition-colors">
                        <option value="">All Departments</option>
                        {% for dept in departments %}
                            <option value="{{ dept }}">{{ dept }}</option>
                        {% endfor %}
                    </select>
                    
                    <div class="flex items-center gap-2">
                        <select name="start_year" class="px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-sbp-500/50 focus:border-sbp-500 transition-colors">
                            <option value="">Start Year</option>
                            {% for y in range(min_year, max_year + 1) %}
                                <option value="{{ y }}">{{ y }}</option>
                            {% endfor %}
                        </select>
                        <span class="text-gray-500 dark:text-gray-400">-</span>
                        <select name="end_year" class="px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-sbp-500/50 focus:border-sbp-500 transition-colors">
                            <option value="">End Year</option>
                            {% for y in range(max_year, min_year - 1, -1) %}
                                <option value="{{ y }}">{{ y }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <select name="sort_by" class="px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-sbp-500/50 focus:border-sbp-500 transition-colors">
                        <option value="relevance">Sort by Relevance</option>
                        <option value="date">Sort by Date</option>
                    </select>

                    <select name="tag" id="tag-select" class="px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-sbp-500/50 focus:border-sbp-500 transition-colors">
                        <option value="">All Tags</option>
                    </select>

                    <button type="button" onclick="exportCSV()" class="ml-auto inline-flex items-center gap-1.5 px-3 py-2 text-sm font-medium rounded-lg border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        Export CSV
                    </button>
                </div>
            </form>

            <script>
            function exportCSV() {
                var form = document.getElementById('search-form');
                var url = new URL('/api/circulars/export_csv', window.location.origin);
                var formData = new FormData(form);
                for (var pair of formData.entries()) {
                    if (pair[1]) {
                        url.searchParams.append(pair[0], pair[1]);
                    }
                }
                window.open(url, '_blank');
            }
            fetch('/api/circulars/tags').then(r => r.json()).then(tags => {
                var sel = document.getElementById('tag-select');
                tags.forEach(function(t) {
                    var opt = document.createElement('option');
                    opt.value = t.tag;
                    opt.textContent = t.tag + ' (' + t.count + ')';
                    sel.appendChild(opt);
                });
            });
            </script>
        </div>

        <!-- Tabs -->
        <div class="mb-6">
            <div class="flex gap-1 border-b border-gray-200 dark:border-gray-800">
                <button @click="activeTab = 'browse'"
                        :class="activeTab === 'browse' ? 'border-sbp-600 text-sbp-700 dark:text-sbp-400' : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'"
                        class="px-4 py-2.5 text-sm font-medium border-b-2 transition-colors">
                    Browse
                </button>
                <button @click="activeTab = 'search'"
                        :class="activeTab === 'search' ? 'border-sbp-600 text-sbp-700 dark:text-sbp-400' : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'"
                        class="px-4 py-2.5 text-sm font-medium border-b-2 transition-colors">
                    Search Results
                </button>
            </div>

            <div x-show="activeTab === 'browse'" x-transition class="mt-4">
                <!-- Browse content -->
                <div id="browse-content"
                     hx-get="/partials/departments"
                     hx-trigger="load"
                     hx-swap="innerHTML"
                     hx-indicator="#browse-spinner">
                </div>
                <div id="browse-spinner" class="htmx-indicator flex items-center justify-center py-8">
                    <div class="flex items-center gap-2 text-sm text-gray-400 dark:text-gray-500">
                        <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Loading...
                    </div>
                </div>
            </div>

            <div x-show="activeTab === 'search'" x-transition class="mt-4">
                <div id="search-results">
                    <div class="text-center py-12 text-gray-400 dark:text-gray-600">
                        <i data-lucide="search" class="w-10 h-10 mx-auto mb-3 opacity-50"></i>
                        <p>Enter a search term to find circulars.</p>
                    </div>
                </div>
                <div id="search-spinner" class="htmx-indicator flex items-center justify-center py-8">
                    <div class="flex items-center gap-2 text-sm text-gray-400 dark:text-gray-500">
                        <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Searching...
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
{% endblock %}
