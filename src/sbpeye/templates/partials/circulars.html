<div class="space-y-4">
    <nav class="flex flex-wrap items-center gap-2 border-b border-reg-lineSoft/80 pb-3 text-[11px] uppercase tracking-[0.18em] text-reg-slate dark:border-reg-line">
        <button hx-get="/partials/departments" hx-target="#browse-content" hx-indicator="#browse-spinner" class="transition hover:text-reg-amber">Departments</button>
        <span>/</span>
        <button hx-get="/partials/years?department={{ department | urlencode }}" hx-target="#browse-content" hx-indicator="#browse-spinner" class="transition hover:text-reg-amber">{{ department }}</button>
        <span>/</span>
        <span class="reference-pill">{{ year }}</span>
    </nav>

    <div class="space-y-3">
        {% for c in circulars %}
        <article class="dossier-row">
            <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                <div class="min-w-0 flex-1">
                    <div class="mb-2 flex flex-wrap items-center gap-2">
                        <span class="reference-pill">{{ c.reference or 'Reference pending' }}</span>
                        <span class="status-pill status-{{ c.status or 'active' }}">{{ c.status or 'active' }}</span>
                        <span class="font-mono text-[11px] uppercase tracking-[0.16em] text-reg-slate">{{ c.date.strftime('%d %b %Y') if c.date else 'Date unavailable' }}</span>
                    </div>
                    <a href="/view_circular?cir={{ c.url | urlencode }}" class="font-serif text-lg leading-7 text-reg-navy transition hover:text-reg-green dark:text-reg-ivory dark:hover:text-reg-amber">
                        {{ c.title }}
                    </a>
                    <div class="mt-2 text-sm text-slate-500 dark:text-reg-slate">{{ department }}</div>
                </div>
                <div class="flex flex-wrap items-center gap-2">
                    {% if c.url and c.url.lower().endswith('.pdf') %}
                    <button onclick="showPdfPreview('{{ c.url }}')" class="terminal-btn terminal-btn-secondary !px-3 !py-2 !text-[11px]">
                        <i data-lucide="eye" class="h-3.5 w-3.5"></i>
                        Preview
                    </button>
                    {% endif %}
                    <a href="{{ c.url }}" target="_blank" rel="noopener noreferrer" class="terminal-btn terminal-btn-secondary !px-3 !py-2 !text-[11px]">
                        <i data-lucide="external-link" class="h-3.5 w-3.5"></i>
                        Original
                    </a>
                </div>
            </div>
        </article>
        {% endfor %}
    </div>
</div>
