<nav class="flex items-center gap-1.5 text-sm mb-4 flex-wrap">
    <span class="font-medium text-gray-900 dark:text-gray-100">All Departments</span>
</nav>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
    {% for d in departments %}
    <div hx-get="/partials/years?department={{ d.department | urlencode }}"
         hx-target="#browse-content"
         hx-indicator="#browse-spinner"
         class="group cursor-pointer bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4 hover:border-sbp-500 dark:hover:border-sbp-400 hover:shadow-md transition-all duration-150">
        <div class="flex items-start justify-between gap-2">
            <div class="font-medium text-gray-900 dark:text-gray-100 group-hover:text-sbp-700 dark:group-hover:text-sbp-400 transition-colors text-sm leading-snug">
                {{ d.department }}
            </div>
            <span class="flex-shrink-0 text-xs bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 px-2 py-0.5 rounded-full">
                {{ d.count }}
            </span>
        </div>
    </div>
    {% endfor %}
</div>
