<div class="space-y-4">
    <nav class="flex items-center gap-2 border-b border-reg-lineSoft/80 pb-3 text-[11px] uppercase tracking-[0.18em] text-reg-slate dark:border-reg-line">
        <span class="reference-pill">Browse</span>
        <span>/</span>
        <span>Departments</span>
    </nav>

    <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-3">
        {% for d in departments %}
        <button hx-get="/partials/years?department={{ d.department | urlencode }}"
                hx-target="#browse-content"
                hx-indicator="#browse-spinner"
                class="dossier-row text-left">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <p class="panel-kicker">Department</p>
                    <p class="mt-2 text-sm font-medium leading-6 text-reg-navy dark:text-reg-ivory">{{ d.department }}</p>
                </div>
                <span class="reference-pill">{{ d.count }}</span>
            </div>
        </button>
        {% endfor %}
    </div>
</div>
