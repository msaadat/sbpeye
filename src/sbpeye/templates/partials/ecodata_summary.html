{% if error %}
<div class="text-center py-8 text-red-600 dark:text-red-400">
    <i data-lucide="alert-circle" class="w-10 h-10 mx-auto mb-3 opacity-50"></i>
    <p class="font-medium">Error loading summary</p>
    <p class="text-sm mt-1 text-gray-500 dark:text-gray-400">{{ error }}</p>
</div>
{% elif summary %}
<div class="ecodata-summary prose prose-sm dark:prose-invert max-w-none">
    {{ summary | safe }}
</div>
{% else %}
<div class="text-center py-8 text-gray-400 dark:text-gray-500">
    <p>No summary available.</p>
</div>
{% endif %}
