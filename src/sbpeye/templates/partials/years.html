<nav class="flex items-center gap-1.5 text-sm mb-4 flex-wrap">
    <a hx-get="/partials/departments"
       hx-target="#browse-content"
       hx-indicator="#browse-spinner"
       class="text-sbp-600 dark:text-sbp-400 hover:text-sbp-800 dark:hover:text-sbp-300 cursor-pointer">All Departments</a>
    <span class="text-gray-400 dark:text-gray-600">/</span>
    <span class="font-medium text-gray-900 dark:text-gray-100">{{ department }}</span>
</nav>

<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3">
    {% for y in years %}
    <div hx-get="/partials/circulars?department={{ department | urlencode }}&year={{ y.year }}"
         hx-target="#browse-content"
         hx-indicator="#browse-spinner"
         class="group cursor-pointer bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4 hover:border-sbp-500 dark:hover:border-sbp-400 hover:shadow-md transition-all duration-150 text-center">
        <div class="text-lg font-bold text-gray-900 dark:text-gray-100 group-hover:text-sbp-700 dark:group-hover:text-sbp-400 transition-colors">
            {{ y.year }}
        </div>
        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">{{ y.count }} circular{{ 's' if y.count != 1 else '' }}</div>
    </div>
    {% endfor %}
</div>
