<div class="space-y-4">
    <nav class="flex flex-wrap items-center gap-2 border-b border-reg-lineSoft/80 pb-3 text-[11px] uppercase tracking-[0.18em] text-reg-slate dark:border-reg-line">
        <button hx-get="/partials/departments" hx-target="#browse-content" hx-indicator="#browse-spinner" class="transition hover:text-reg-amber">Departments</button>
        <span>/</span>
        <span class="reference-pill">{{ department }}</span>
        <span>/</span>
        <span>Years</span>
    </nav>

    <div class="grid grid-cols-2 gap-3 md:grid-cols-3 xl:grid-cols-5">
        {% for y in years %}
        <button hx-get="/partials/circulars?department={{ department | urlencode }}&year={{ y.year }}"
                hx-target="#browse-content"
                hx-indicator="#browse-spinner"
                class="dossier-row text-center">
            <p class="font-mono text-xs uppercase tracking-[0.18em] text-reg-slate">Archive Year</p>
            <p class="mt-3 font-serif text-3xl text-reg-navy dark:text-reg-ivory">{{ y.year }}</p>
            <p class="mt-2 text-xs text-slate-500 dark:text-reg-slate">{{ y.count }} circular{{ 's' if y.count != 1 else '' }}</p>
        </button>
        {% endfor %}
    </div>
</div>
